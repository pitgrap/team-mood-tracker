services:
  - type: web
    name: mood-tracker-api
    runtime: node
    region: frankfurt
    plan: free
    buildCommand: npm i -g pnpm && cd backend && pnpm install --frozen-lockfile && pnpm exec prisma migrate deploy && pnpm exec prisma db seed && pnpm run build
    startCommand: cd backend && pnpm start
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mood-tracker-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: SURVEY_TOKEN_SECRET
        generateValue: true
      - key: SURVEY_TOKEN_EXPIRY
        value: 7d
      - key: FRONTEND_URL
        value: https://mood-tracker-frontend.onrender.com
      - key: METABASE_ENDPOINT
        sync: false
      - key: METABASE_API_KEY
        sync: false
      - key: ADMIN_SEED_EMAIL
        sync: false
      - key: ADMIN_SEED_PASSWORD
        sync: false

  - type: web
    name: mood-tracker-frontend
    runtime: static
    region: frankfurt
    plan: free
    buildCommand: npm i -g pnpm && cd frontend && pnpm install --frozen-lockfile && pnpm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://mood-tracker-api.onrender.com

databases:
  - name: mood-tracker-db
    region: frankfurt
    plan: free
    databaseName: moodtracker

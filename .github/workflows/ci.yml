name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  format-check:
    name: Prettier Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci
      - run: npx prettier --check .

  backend-lint-typecheck:
    name: Backend Lint & Type Check
    runs-on: ubuntu-latest
    needs: format-check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci
      - run: cd backend && npx eslint src/ --ext .ts
      - run: cd backend && npx tsc --noEmit

  backend-unit:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    needs: backend-lint-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci
      - run: cd backend && npx prisma generate
      - run: cd backend && npm run test:unit

  backend-integration:
    name: Backend Integration Tests
    runs-on: ubuntu-latest
    needs: backend-lint-typecheck
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: moodtracker_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://test:test@localhost:5433/moodtracker_test
      JWT_SECRET: ci-test-jwt-secret
      SURVEY_TOKEN_SECRET: ci-test-survey-token-secret
      FRONTEND_URL: http://localhost:5173
      ADMIN_SEED_EMAIL: admin@test.com
      ADMIN_SEED_PASSWORD: testpassword
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci
      - run: cd backend && npx prisma migrate deploy
      - run: cd backend && npx prisma db seed
      - run: cd backend && npm run test:integration

  frontend-lint-typecheck:
    name: Frontend Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci
      - run: cd frontend && npx eslint src/ --ext .ts,.tsx
      - run: cd frontend && npx tsc --noEmit

  frontend-unit:
    name: Frontend Unit Tests
    runs-on: ubuntu-latest
    needs: frontend-lint-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci
      - run: cd frontend && npm test

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [backend-unit, backend-integration, frontend-unit]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: echo "E2E tests placeholder — will be implemented in M5"
